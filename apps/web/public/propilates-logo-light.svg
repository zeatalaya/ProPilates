<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#96712a"/>
      <stop offset="50%" style="stop-color:#b8892a"/>
      <stop offset="100%" style="stop-color:#96712a"/>
    </linearGradient>
  </defs>

  <!-- Thin gold top bar accent -->
  <rect x="30" y="28" width="36" height="1.2" fill="url(#goldGrad)"/>

  <!-- PRO: dark text for light backgrounds -->
  <text x="30" y="78"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="58"
    font-weight="300"
    letter-spacing="2"
    fill="#1a1a2e">PRO</text>

  <!-- Vertical gold divider -->
  <rect x="148" y="30" width="1" height="56" fill="#96712a" opacity="0.7"/>

  <!-- PILATES: deeper gold for light backgrounds -->
  <text x="164" y="58"
    font-family="'Montserrat', Arial, sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="7"
    fill="url(#goldGrad)">PILATES</text>

  <!-- Tagline -->
  <text x="164" y="78"
    font-family="'Montserrat', Arial, sans-serif"
    font-size="9"
    font-weight="200"
    letter-spacing="4"
    fill="#1a1a2e"
    opacity="0.45">STUDIO APP</text>

</svg>
