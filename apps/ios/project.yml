name: ProPilates
options:
  bundleIdPrefix: com.propilates
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Stripe:
    url: https://github.com/stripe/stripe-ios
    from: "24.0.0"

targets:
  ProPilates:
    type: application
    platform: iOS
    sources:
      - ProPilates
    resources:
      - ProPilates/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.propilates.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ProPilates/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
    dependencies:
      - package: Supabase
      - package: Stripe
        product: StripePaymentSheet
    entitlements:
      path: ProPilates/Resources/ProPilates.entitlements
    info:
      path: ProPilates/Resources/Info.plist

  ProPilatesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ProPilatesTests
    dependencies:
      - target: ProPilates
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
